data:
  empty-dir: {}
  work: {}

mounts:
  ~/placeholder: empty-dir
  /work: work

sidecars:
  dkr:
    image: docker.io/docker:28-dind-rootless
    env:
      DOCKER_TLS_CERTDIR: ''
      DOCKER_TLS_VERIFY: ''
    args:
      - --tls=false
      - --host=tcp://0.0.0.0:2375
    privileged: true
    init: false
    mounts:
      /var/placeholder: empty-dir
