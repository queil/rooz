data:
  empty-dir: {}
  work: {}

  git-config: |-
    [url "git@github.com:"]
    insteadOf = gh:

  bash-history: ""

mounts:
  ~/placeholder: empty-dir
  /work: work
  ~/.gitconfig2: git-config
  ~/.bash_history: bash-history
  /this/is/weird: bash-history

sidecars:
  dkr:
    image: docker.io/docker:28-dind-rootless
    env:
      DOCKER_TLS_CERTDIR: ''
      DOCKER_TLS_VERIFY: ''
    args:
      - --tls=false
      - --host=tcp://0.0.0.0:2375
    privileged: true
    init: false
    mounts:
      /var/placeholder: empty-dir
      /root/.gitconfig: git-config
