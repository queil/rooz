# v2.1 --------------------------------------

# OK actually maybe split the definition of objects from the usage (like docker compose) and have:

data:

  # keys in this map as used as a key that we reference in mounts and sidecar.mounts
  some-dir: {} # empty map indicates a dir

  inline-file: |
    some content
    here

  empty-file: ""

  my-repo:
    git:
      repo: git@github.com:user/repo
      path: /src # <-- optional dir

  my-repo-root:
    git:
      repo: git@github.com:user/other

  from-image:
    image:
      ref: nginx:latest
      path: /etc/nginx/nginx.conf # mandatory dir or file

  local-thing:
    path: ./local/file.txt # mandatory dir or file

#workspace mounts
mounts:
  ~/.kubeconfig: k8s-config

sidecars:
  k3s:
    # sidecar mounts
    mounts:
      /etc/k3s/kubeconfig: k8s-config
